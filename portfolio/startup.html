<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Demo | Maple Webs</title>
<link rel="stylesheet" href="../styles.css">
<style>
body {background:#f4f7f5; color:#1c1c1c; font-family: Arial,sans-serif;}
header {padding:60px 20px; text-align:center; background:linear-gradient(135deg,#e6efe9,#ffffff);}
header h1 {color:#2f5d50; font-size:2.5rem; margin-bottom:10px;}
header p {font-size:1.2rem; margin-bottom:20px;}
button {background:#2f5d50; color:#fff; border:none; padding:10px 20px; cursor:pointer; transition:.3s;}
button:hover {background:#7fb069;}
.section {max-width:1100px; margin:auto; padding:40px 20px; text-align:center;}
.cards {display:flex; flex-wrap:wrap; justify-content:center; gap:20px;}
.card {background:white; padding:20px; border-radius:10px; flex:1 1 250px; transition: transform 0.3s;}
.card:hover {transform: translateY(-10px);}
.pricing {display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px;}
.plan {background:white; padding:20px; border-radius:10px; flex:1 1 250px; transition: transform 0.3s;}
.plan:hover {transform: translateY(-10px);}
@media(max-width:768px){header h1{font-size:1.8rem}}
</style>
</head>
<body>

<header>
  <h1>StartupX</h1>
  <p>Innovative solutions for modern businesses.</p>
  <button onclick="window.history.back()">Back to Portfolio</button>
</header>

<section class="section">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">SaaS Platform</div>
    <div class="card">Cloud Integration</div>
    <div class="card">Analytics Dashboard</div>
  </div>
</section>

<section class="section">
  <h2>Pricing</h2>
  <div class="pricing">
    <div class="plan">
      <h3>Starter</h3>
      <p>$19/mo</p>
      <p>Basic features</p>
    </div>
    <div class="plan">
      <h3>Pro</h3>
      <p>$49/mo</p>
      <p>Advanced features</p>
    </div>
    <div class="plan">
      <h3>Enterprise</h3>
      <p>$99/mo</p>
      <p>All features</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <p>Email: contact@startupx.com</p>
</section>

<footer>
  <p>© 2026 Maple Webs</p>
</footer>

</body>
</html>
